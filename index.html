<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Money Concepts Dashboard</title>
    <style>
        body {
            background-color: #0b0e11;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 95vh;
            overflow: hidden;
        }
        #dashboard-container {
            display: flex;
            gap: 15px;
            flex: 1;
            height: 100%;
        }
        #chart-container {
            flex: 3;
            background: #12161a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #23292f;
        }
        #side-panel {
            flex: 1;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .widget-box {
            flex: 1;
            background: #12161a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #23292f;
        }
        h2 { text-align: center; margin: 10px 0 0 0; color: #f0b90b; font-size: 18px; }
    </style>
</head>
<body>

    <h1 style="margin: 0; font-size: 24px; color: #f0b90b; text-align: center; font-weight: 600;">
        BTC/USDT Smart Money Concepts (SMC) Workspace
    </h1>

    <div id="dashboard-container">
        
        <div id="chart-container">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_smc" style="height:100%;width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:BTCUSDT",
                    "interval": "15", /* SMC වලට හොඳම 15m චාර්ට් එක */
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "studies": [
                        "STD;Smart_Money_Concepts" /* Automatically triggers TradingView SMC indicator overlay */
                    ],
                    "container_id": "tradingview_smc"
                });
                </script>
            </div>
        </div>

        <div id="side-panel">
            
            <div class="widget-box">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                        "interval": "15m",
                        "width": "100%",
                        "isTransparent": true,
                        "height": "100%",
                        "symbol": "BINANCE:BTCUSDT",
                        "showHeading": true,
                        "headingText": "SMC Trend Analysis",
                        "locale": "en",
                        "theme": "dark"
                    }
                    </script>
                </div>
            </div>

            <div class="widget-box">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                        "feedMode": "allSymbols",
                        "isTransparent": true,
                        "displayMode": "regular",
                        "width": "100%",
                        "height": "100%",
                        "colorTheme": "dark",
                        "locale": "en"
                    }
                    </script>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
