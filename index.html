<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading Dashboard</title>
    <style>
        body {
            background-color: #131722;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 95vh;
        }
        #dashboard-container {
            display: flex;
            gap: 20px;
            flex: 1;
            height: 100%;
        }
        #chart-container {
            flex: 2;
            background: #1c2030;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .order-book {
            flex: 1;
            max-width: 350px;
            background: #1c2030;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        h2 { text-align: center; margin-top: 0; color: #f0b90b; font-size: 20px; }
        .section { margin-bottom: 15px; }
        .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        .ask { color: #ff4a4a; } /* Sellers */
        .bid { color: #00c853; } /* Buyers */
        .header { font-weight: bold; color: #848e9c; border-bottom: 1px solid #2b3139; padding-bottom: 5px; }
    </style>
</head>
<body>

    <h1 style="margin: 0; font-size: 24px; color: #f0b90b; text-align: center;">Live Crypto Dashboard</h1>

    <div id="dashboard-container">
        <div id="chart-container">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_chart" style="height:100%;width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:BTCUSDT",
                    "interval": "1",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_chart"
                });
                </script>
            </div>
        </div>

        <div class="order-book">
            <h2>Live Order Book (Binance)</h2>
            <div class="section">
                <div class="row header"><span>Price (USDT)</span> <span>Amount (BTC)</span></div>
                <div id="asks-list">Connecting to live stream...</div>
            </div>
            <div class="section">
                <div class="row header"><span>Price (USDT)</span> <span>Amount (BTC)</span></div>
                <div id="bids-list">Connecting to live stream...</div>
            </div>
        </div>
    </div>

<script>
    // Live Order Book Stream using standard fallback secure stream
    const depthWs = new WebSocket("wss://stream.binance.com:443/ws/btcusdt@depth10@100ms");
    const asksList = document.getElementById('asks-list');
    const bidsList = document.getElementById('bids-list');

    depthWs.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        let asksHTML = "";
        data.asks.slice(0, 10).reverse().forEach(ask => {
            asksHTML += `<div class="row ask"><span>${parseFloat(ask[0]).toFixed(2)}</span> <span>${parseFloat(ask[1]).toFixed(4)}</span></div>`;
        });
        asksList.innerHTML = asksHTML;

        let bidsHTML = "";
        data.bids.slice(0, 10).forEach(bid => {
            bidsHTML += `<div class="row bid"><span>${parseFloat(bid[0]).toFixed(2)}</span> <span>${parseFloat(bid[1]).toFixed(4)}</span></div>`;
        });
        bidsList.innerHTML = bidsHTML;
    };

    depthWs.onerror = (err) => {
        asksList.innerHTML = "<span style='color:orange'>Connection blocked by ISP. Please try using a VPN to see live orders.</span>";
        bidsList.innerHTML = "<span style='color:orange'>Connection blocked by ISP. Please try using a VPN to see live orders.</span>";
    };
</script>

</body>
</html>
